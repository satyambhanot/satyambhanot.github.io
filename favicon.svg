<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="orb-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E97451"/>
      <stop offset="100%" stop-color="#D56437"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feOffset dx="0" dy="1" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main Orb -->
  <circle cx="32" cy="32" r="30" fill="url(#orb-bg)"/>
  
  <!-- Subtle Inner Light -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="white" stroke-width="0.5" opacity="0.3"/>

  <!-- Bold Minimalist S -->
  <text x="32" y="44" 
        text-anchor="middle" 
        font-family="'Syne', sans-serif" 
        font-weight="800" 
        font-size="34" 
        fill="white" 
        filter="url(#soft-shadow)">S</text>
</svg>
