<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satyam Bhanot OG Image</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            width: 1200px;
            height: 630px;
            overflow: hidden;
            color: #f8fafc;
            background:
                linear-gradient(rgba(148, 163, 184, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 163, 184, 0.08) 1px, transparent 1px),
                linear-gradient(135deg, #0f172a 0%, #111827 48%, #0b1120 100%);
            background-size: 72px 72px, 72px 72px, auto;
            font-family: "Instrument Sans", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        .card {
            position: relative;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 380px;
            gap: 64px;
            align-items: center;
            width: 100%;
            height: 100%;
            padding: 70px 76px;
        }

        .card::after {
            content: "";
            position: absolute;
            right: 64px;
            bottom: 36px;
            width: 420px;
            height: 120px;
            border: 1px solid rgba(96, 165, 250, 0.32);
            border-radius: 999px;
            transform: rotate(-10deg);
        }

        .eyebrow {
            margin: 0 0 22px;
            color: #60a5fa;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1 {
            max-width: 720px;
            margin: 0 0 24px;
            font-size: 92px;
            line-height: 0.96;
            letter-spacing: 0;
        }

        h1 span {
            color: #93c5fd;
        }

        .summary {
            max-width: 720px;
            margin: 0;
            color: #cbd5e1;
            font-size: 28px;
            line-height: 1.35;
            font-weight: 650;
        }

        .tags {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        .tags span {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 38px;
            padding: 8px 16px;
            color: #dbeafe;
            background: rgba(59, 130, 246, 0.22);
            border: 1px solid rgba(96, 165, 250, 0.36);
            border-radius: 999px;
            font-size: 16px;
            font-weight: 800;
        }

        .portrait-card {
            position: relative;
            z-index: 1;
            padding: 14px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(96, 165, 250, 0.5);
            border-radius: 24px;
            box-shadow: 0 28px 70px rgba(0, 0, 0, 0.34);
        }

        .portrait-card img {
            width: 100%;
            aspect-ratio: 4 / 5;
            object-fit: cover;
            object-position: center 28%;
            border-radius: 16px;
        }

        .portrait-footer {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 14px;
            color: #dbeafe;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 15px;
            font-weight: 850;
            text-transform: uppercase;
        }

        .portrait-footer span {
            padding: 9px 10px;
            text-align: center;
            background: rgba(30, 41, 59, 0.8);
            border-radius: 999px;
        }
    </style>
</head>
<body>
    <main class="card">
        <section>
            <p class="eyebrow">Satyam Bhanot · Computer Science Honours</p>
            <h1>Projects that show <span>my learning.</span></h1>
            <p class="summary">Backend, data, systems, and ML work explained through the question, what I tried, and what I learned.</p>
            <div class="tags" aria-label="Skills">
                <span>Java</span>
                <span>Python</span>
                <span>C</span>
                <span>SQL</span>
                <span>ML</span>
            </div>
        </section>
        <aside class="portrait-card">
            <img src="my-photo.jpg" alt="">
            <div class="portrait-footer" aria-hidden="true">
                <span>Question</span>
                <span>Tried</span>
                <span>Learned</span>
            </div>
        </aside>
    </main>
</body>
</html>
